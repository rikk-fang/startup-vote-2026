<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Startup Vote 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.6rem;
      color: #a78bfa;
      margin-bottom: 0.25rem;
      text-align: center;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 2rem;
      text-align: center;
    }

    .budget-bar {
      width: 100%;
      max-width: 560px;
      background: #1e1e2e;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      border: 1px solid #2e2e4e;
    }

    .budget-label {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-bottom: 0.4rem;
    }

    .budget-remaining {
      font-size: 1.5rem;
      font-weight: 700;
      color: #a78bfa;
    }

    .budget-remaining.warning { color: #f59e0b; }
    .budget-remaining.danger  { color: #ef4444; }

    .group-card {
      width: 100%;
      max-width: 560px;
      background: #1e1e2e;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      border: 1px solid #2e2e4e;
      transition: border-color 0.2s;
    }

    .group-card.locked {
      border-color: #a78bfa;
      opacity: 0.75;
    }

    .group-name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #e8e8f0;
    }

    .coin-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .coin-row input[type=number] {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #3b3b5c;
      border-radius: 8px;
      color: #e8e8f0;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      outline: none;
    }

    .coin-row input[type=number]:focus {
      border-color: #a78bfa;
    }

    .lock-btn {
      background: #a78bfa;
      color: #0f0f1a;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .lock-btn:disabled {
      background: #3b3b5c;
      color: #6b7280;
      cursor: not-allowed;
    }

    .locked-amount {
      font-size: 0.9rem;
      color: #a78bfa;
      font-weight: 600;
    }

    .section-title {
      width: 100%;
      max-width: 560px;
      font-size: 0.85rem;
      color: #9ca3af;
      margin: 1.5rem 0 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .best-grid {
      width: 100%;
      max-width: 560px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .best-btn {
      background: #1e1e2e;
      border: 2px solid #2e2e4e;
      border-radius: 10px;
      color: #e8e8f0;
      padding: 0.75rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .best-btn.selected {
      border-color: #a78bfa;
      background: #2d2b4e;
      color: #a78bfa;
      font-weight: 700;
    }

    .submit-btn {
      width: 100%;
      max-width: 560px;
      background: #a78bfa;
      color: #0f0f1a;
      border: none;
      border-radius: 10px;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 3rem;
    }

    .submit-btn:disabled {
      background: #3b3b5c;
      color: #6b7280;
      cursor: not-allowed;
    }

    #setup-screen {
      width: 100%;
      max-width: 560px;
    }

    .setup-field {
      margin-bottom: 1rem;
    }

    .setup-field label {
      display: block;
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 0.4rem;
    }

    .setup-field input, .setup-field select {
      width: 100%;
      background: #1e1e2e;
      border: 1px solid #3b3b5c;
      border-radius: 8px;
      color: #e8e8f0;
      padding: 0.6rem 0.75rem;
      font-size: 0.95rem;
      outline: none;
    }

    .group-entry {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .group-entry input {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #3b3b5c;
      border-radius: 8px;
      color: #e8e8f0;
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      outline: none;
    }

    .add-group-btn {
      background: #2e2e4e;
      color: #a78bfa;
      border: 1px solid #a78bfa;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .remove-btn {
      background: #3b1f1f;
      color: #ef4444;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .start-btn {
      width: 100%;
      background: #a78bfa;
      color: #0f0f1a;
      border: none;
      border-radius: 10px;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1rem;
    }

    .thank-you {
      text-align: center;
      padding: 3rem 1rem;
    }

    .thank-you h2 {
      color: #a78bfa;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .thank-you p {
      color: #6b7280;
      margin-bottom: 2rem;
    }

    .next-btn {
      background: #a78bfa;
      color: #0f0f1a;
      border: none;
      border-radius: 10px;
      padding: 0.9rem 2rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .back-btn {
      background: #2e2e4e;
      color: #a78bfa;
      border: none;
      border-radius: 10px;
      padding: 0.6rem 1.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    footer {
      font-size: 0.75rem;
      color: #3b3b5c;
      margin-top: auto;
      padding-top: 2rem;
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: #1e1e2e;
      border: 1px solid #3b3b5c;
      border-radius: 8px;
      color: #a78bfa;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
      z-index: 100;
    }

    body.light {
      background: #f5f5fa;
      color: #1a1a2e;
    }

    body.light .budget-bar,
    body.light .group-card,
    body.light .best-btn {
      background: #ffffff;
      border-color: #d1d5db;
    }

    body.light .coin-row input[type=number],
    body.light .setup-field input,
    body.light .setup-field select,
    body.light .group-entry input {
      background: #f0f0f8;
      border-color: #d1d5db;
      color: #1a1a2e;
    }

    body.light .budget-label,
    body.light .section-title,
    body.light .subtitle {
      color: #6b7280;
    }

    body.light .theme-toggle {
      background: #ffffff;
      border-color: #d1d5db;
    }

    body.light .add-group-btn {
      background: #f0f0f8;
    }

    body.light .back-btn {
      background: #e8e8f8;
    }

body.light footer {
      color: #d1d5db;
    }

    .coin-display {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #3b3b5c;
      border-radius: 8px;
      color: #e8e8f0;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      cursor: pointer;
      user-select: none;
    }

    .coin-display.focused {
      border-color: #a78bfa;
      color: #a78bfa;
    }

    .keypad {
      margin-top: 1rem;
    }

    .keypad-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
    }

    .key {
      background: #2e2e4e;
      color: #e8e8f0;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.1s;
    }

    .key:active { background: #a78bfa; color: #0f0f1a; }

    .key-wide {
      background: #3b1f1f;
      color: #ef4444;
    }

    .key-allin {
      grid-column: 1 / -1;
      background: #1a2e1a;
      color: #34d399;
      font-size: 0.95rem;
    }

    .key-allin:active { background: #34d399; color: #0f0f1a; }

    body.light .coin-display {
      background: #f0f0f8;
      border-color: #d1d5db;
      color: #1a1a2e;
    }

    body.light .coin-display.focused {
      border-color: #a78bfa;
      color: #a78bfa;
    }

    body.light .key {
      background: #e8e8f8;
      color: #1a1a2e;
    }

    body.light .key-wide {
      background: #fde8e8;
      color: #ef4444;
    }

    body.light .key-allin {
      background: #e8f8f0;
      color: #059669;
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyScoyGaCRh9HUwjkkaUtlMTCXjD8eX4kV_wuplLLqGT6Khjm8XZYLqDALPcwtuCok2/exec';
  const BUDGET = 100000;

let state = {
    screen: 'setup',
    class: '',
    groups: [],
    allocations: {},
    locked: {},
    bestVote: null,
    activeGroup: null,
    keypadValue: ''
  };

  // Theme toggle — created once, never touched by render()
  const toggle = document.createElement('button');
  toggle.className = 'theme-toggle';
  toggle.textContent = '☀ Light';
  toggle.addEventListener('click', () => {
    document.body.classList.toggle('light');
    toggle.textContent = document.body.classList.contains('light') ? '☾ Dark' : '☀ Light';
  });
  document.body.appendChild(toggle);

  function remaining() {
    const spent = Object.values(state.allocations).reduce((a, b) => a + b, 0);
    return BUDGET - spent;
  }

  function render() {
    const app = document.getElementById('app');
    if (state.screen === 'setup') app.innerHTML = setupHTML();
    else if (state.screen === 'voting') app.innerHTML = votingHTML();
    else app.innerHTML = thankYouHTML();
    attachListeners();
  }

  function setupHTML() {
    const groupInputs = state.groups.map((g, i) => `
      <div class="group-entry">
        <input type="text" value="${g}" data-idx="${i}" class="group-input" placeholder="Group name" />
        <button class="remove-btn" data-remove="${i}">✕</button>
      </div>
    `).join('');
return `
        <div class="group-card ${state.activeGroup === g ? 'active' : ''}">
          <div class="group-name">${g}</div>
          <div class="coin-row">
            <div class="coin-display ${state.activeGroup === g ? 'focused' : ''}" data-open="${g}">
              ${state.allocations[g] ? state.allocations[g].toLocaleString() : '0'}
            </div>
            <button class="lock-btn" data-lock="${g}">Lock in</button>
          </div>
          ${state.activeGroup === g ? `
          <div class="keypad">
            <div class="keypad-grid">
              <button class="key" data-key="7">7</button>
              <button class="key" data-key="8">8</button>
              <button class="key" data-key="9">9</button>
              <button class="key" data-key="4">4</button>
              <button class="key" data-key="5">5</button>
              <button class="key" data-key="6">6</button>
              <button class="key" data-key="1">1</button>
              <button class="key" data-key="2">2</button>
              <button class="key" data-key="3">3</button>
              <button class="key key-wide" data-key="clear">CLR</button>
              <button class="key" data-key="0">0</button>
              <button class="key" data-key="back">⌫</button>
              <button class="key key-allin" data-key="allin">All In</button>
            </div>
          </div>` : ''}
        </div>
      `;

        <div class="setup-field">
          <label>Presenting groups</label>
          ${groupInputs}
          <button class="add-group-btn" id="add-group">+ Add group</button>
        </div>

        <button class="start-btn" id="start-btn">Start voting session</button>
      </div>
    `;
  }

  function votingHTML() {
    const rem = remaining();
    const remClass = rem < 10000 ? 'danger' : rem < 30000 ? 'warning' : '';

    const groupCards = state.groups.map(g => {
      if (state.locked[g]) {
        return `
          <div class="group-card locked">
            <div class="group-name">${g}</div>
            <span class="locked-amount">⟡ ${state.allocations[g].toLocaleString()} coins locked</span>
          </div>
        `;
      }
      return `
        <div class="group-card">
          <div class="group-name">${g}</div>
          <div class="coin-row">
            <input type="number" min="0" max="${rem + (state.allocations[g] || 0)}"
              value="${state.allocations[g] || ''}" data-group="${g}" class="coin-input"
              placeholder="0" />
            <button class="lock-btn" data-lock="${g}">Lock in</button>
          </div>
        </div>
      `;
    }).join('');

    const bestButtons = state.groups.map(g => `
      <button class="best-btn ${state.bestVote === g ? 'selected' : ''}" data-best="${g}">${g}</button>
    `).join('');

    const allLocked = state.groups.every(g => state.locked[g]);
    const canSubmit = allLocked && state.bestVote;

    return `
      <h1>Startup Vote 2026</h1>
      <p class="subtitle">${state.class} · Allocate your investment</p>

      <div class="budget-bar">
        <div class="budget-label">Remaining budget</div>
        <div class="budget-remaining ${remClass}">⟡ ${rem.toLocaleString()} coins</div>
      </div>

      ${groupCards}

      <div class="section-title">Best presentation overall</div>
      <div class="best-grid">${bestButtons}</div>

      <button class="submit-btn" id="submit-btn" ${canSubmit ? '' : 'disabled'}>
        Submit vote
      </button>

      <footer>Created by Fang and Claw 2026</footer>
    `;
  }

  function thankYouHTML() {
    return `
      <div class="thank-you">
        <h2>Vote submitted!</h2>
        <p>Pass the device to the next student.</p>
        <button class="next-btn" id="next-btn">Next voter</button>
        <button class="back-btn" id="setup-btn">↩ Back to setup</button>
      </div>
    `;
  }

  function attachListeners() {
    if (state.screen === 'setup') {
      document.getElementById('class-select')?.addEventListener('change', e => {
        state.class = e.target.value;
      });

      document.querySelectorAll('.group-input').forEach(input => {
        input.addEventListener('input', e => {
          state.groups[+e.target.dataset.idx] = e.target.value;
        });
      });

      document.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', e => {
          state.groups.splice(+e.target.dataset.remove, 1);
          render();
        });
      });

      document.getElementById('add-group')?.addEventListener('click', () => {
        state.groups.push('');
        render();
      });

      document.getElementById('start-btn')?.addEventListener('click', () => {
        if (!state.class) return alert('Please select a class.');
        const clean = state.groups.map(g => g.trim()).filter(Boolean);
        if (clean.length < 2) return alert('Please add at least 2 groups.');
        state.groups = clean;
        state.allocations = {};
        state.locked = {};
        state.bestVote = null;
        state.screen = 'voting';
        render();
      });
    }

if (state.screen === 'voting') {
      document.querySelectorAll('[data-open]').forEach(display => {
        display.addEventListener('click', e => {
          const group = e.target.dataset.open;
          if (state.locked[group]) return;
          if (state.activeGroup === group) {
            state.activeGroup = null;
            state.keypadValue = '';
          } else {
            state.activeGroup = group;
            state.keypadValue = state.allocations[group] ? String(state.allocations[group]) : '';
          }
          render();
        });
      });

      document.querySelectorAll('.key').forEach(key => {
        key.addEventListener('click', e => {
          const k = e.target.dataset.key;
          const group = state.activeGroup;
          if (!group) return;

          const lockedSpent = Object.entries(state.allocations)
            .filter(([g]) => state.locked[g] && g !== group)
            .reduce((a, [, v]) => a + v, 0);
          const unlockedOthers = Object.entries(state.allocations)
            .filter(([g]) => !state.locked[g] && g !== group)
            .reduce((a, [, v]) => a + v, 0);
          const maxAllowed = BUDGET - lockedSpent - unlockedOthers;

          if (k === 'clear') {
            state.keypadValue = '';
            state.allocations[group] = 0;
          } else if (k === 'back') {
            state.keypadValue = state.keypadValue.slice(0, -1);
            state.allocations[group] = Math.min(parseInt(state.keypadValue) || 0, maxAllowed);
          } else if (k === 'allin') {
            state.allocations[group] = maxAllowed;
            state.keypadValue = String(maxAllowed);
          } else {
            const next = state.keypadValue + k;
            const val = Math.min(parseInt(next) || 0, maxAllowed);
            state.keypadValue = String(val);
            state.allocations[group] = val;
          }
          render();
        });
      });

      document.querySelectorAll('[data-lock]').forEach(btn => {
        btn.addEventListener('click', e => {
          const group = e.target.dataset.lock;
          state.allocations[group] = state.allocations[group] || 0;
          state.locked[group] = true;
          state.activeGroup = null;
          state.keypadValue = '';
          render();
        });
      });

      document.querySelectorAll('[data-best]').forEach(btn => {
        btn.addEventListener('click', e => {
          state.bestVote = e.target.dataset.best;
          render();
        });
      });

      document.getElementById('submit-btn')?.addEventListener('click', async (e) => {
        e.target.disabled = true;
        const payload = {
          class: state.class,
          group_voted: state.bestVote,
          allocations: Object.entries(state.allocations).map(([group, amount]) => ({ group, amount }))
        };

        try {
          await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
          });
        } catch (err) {
          console.error('Submission error:', err);
        }

        state.screen = 'thankyou';
        render();
      });
    }

    if (state.screen === 'thankyou') {
      document.getElementById('next-btn')?.addEventListener('click', () => {
        state.allocations = {};
        state.locked = {};
        state.bestVote = null;
        state.screen = 'voting';
        render();
      });

      document.getElementById('setup-btn')?.addEventListener('click', () => {
        state.allocations = {};
        state.locked = {};
        state.bestVote = null;
        state.screen = 'setup';
        render();
      });
    }
  }

  render();
</script>
</body>
</html>
