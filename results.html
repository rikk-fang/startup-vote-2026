<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Startup Vote 2026 — Results</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.6rem;
      color: #a78bfa;
      margin-bottom: 0.25rem;
      text-align: center;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 2rem;
      text-align: center;
    }

    .class-section {
      width: 100%;
      max-width: 640px;
      margin-bottom: 2.5rem;
    }

    .class-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #a78bfa;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #2e2e4e;
    }

    .group-row {
      background: #1e1e2e;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      border: 1px solid #2e2e4e;
    }

    .group-row-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .group-row-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .group-row-votes {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .bar-track {
      background: #0f0f1a;
      border-radius: 999px;
      height: 10px;
      width: 100%;
      overflow: hidden;
      margin-bottom: 0.4rem;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: #a78bfa;
      transition: width 0.6s ease;
    }

    .bar-fill.best { background: #34d399; }

    .stats-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #6b7280;
    }

    .coins-label { color: #a78bfa; font-weight: 600; }
    .best-label  { color: #34d399; font-weight: 600; }

    .refresh-btn {
      background: #a78bfa;
      color: #0f0f1a;
      border: none;
      border-radius: 10px;
      padding: 0.7rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 2rem;
    }

    .loading {
      color: #6b7280;
      font-size: 0.9rem;
      margin: 2rem 0;
    }

    .error {
      color: #ef4444;
      font-size: 0.9rem;
      margin: 2rem 0;
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: #1e1e2e;
      border: 1px solid #3b3b5c;
      border-radius: 8px;
      color: #a78bfa;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
      z-index: 100;
    }

    footer {
      font-size: 0.75rem;
      color: #3b3b5c;
      margin-top: auto;
      padding-top: 2rem;
    }

    body.light { background: #f5f5fa; color: #1a1a2e; }
    body.light .group-row { background: #ffffff; border-color: #d1d5db; }
    body.light .bar-track { background: #e8e8f8; }
    body.light .class-title { border-color: #d1d5db; }
    body.light .theme-toggle { background: #ffffff; border-color: #d1d5db; }
    body.light footer { color: #d1d5db; }
  </style>
</head>
<body>

<div id="app">
  <h1>Startup Vote 2026</h1>
  <p class="subtitle">Results — Teacher view</p>
  <p class="loading" id="loading">Loading results...</p>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyScoyGaCRh9HUwjkkaUtlMTCXjD8eX4kV_wuplLLqGT6Khjm8XZYLqDALPcwtuCok2/exec';

  // Theme toggle
  const toggle = document.createElement('button');
  toggle.className = 'theme-toggle';
  toggle.textContent = '☀ Light';
  toggle.addEventListener('click', () => {
    document.body.classList.toggle('light');
    toggle.textContent = document.body.classList.contains('light') ? '☾ Dark' : '☀ Light';
  });
  document.body.appendChild(toggle);

  async function loadResults() {
    const app = document.getElementById('app');
    app.innerHTML = `
      <h1>Startup Vote 2026</h1>
      <p class="subtitle">Results — Teacher view</p>
      <p class="loading">Loading results...</p>
    `;

    try {
      const res = await fetch(SCRIPT_URL);
      const json = await res.json();

      if (json.status !== 'ok') throw new Error('Script returned error');

      const data = json.data;
      const classes = Object.keys(data);

      if (classes.length === 0) {
        app.innerHTML = `
          <h1>Startup Vote 2026</h1>
          <p class="subtitle">Results — Teacher view</p>
          <p class="loading">No votes yet.</p>
          <button class="refresh-btn" id="refresh">↻ Refresh</button>
        `;
        document.getElementById('refresh').addEventListener('click', loadResults);
        return;
      }

      let html = `
        <h1>Startup Vote 2026</h1>
        <p class="subtitle">Results — Teacher view</p>
        <button class="refresh-btn" id="refresh">↻ Refresh</button>
      `;

      classes.sort().forEach(cls => {
        const groups = data[cls];
        const names = Object.keys(groups);

        const maxCoins = Math.max(...names.map(n => groups[n].coins), 1);
        const maxBest  = Math.max(...names.map(n => groups[n].best_votes), 1);
        const totalBest = names.reduce((a, n) => a + groups[n].best_votes, 0);
        const totalCoins = names.reduce((a, n) => a + groups[n].coins, 0);

        const sorted = [...names].sort((a, b) => groups[b].coins - groups[a].coins);

        html += `<div class="class-section"><div class="class-title">${cls} — ${totalBest} votes · ${totalCoins.toLocaleString()} coins invested</div>`;

        sorted.forEach(name => {
          const g = groups[name];
          const coinPct  = maxCoins > 0 ? (g.coins / maxCoins * 100).toFixed(1) : 0;
          const bestPct  = maxBest  > 0 ? (g.best_votes / maxBest * 100).toFixed(1) : 0;

          html += `
            <div class="group-row">
              <div class="group-row-header">
                <span class="group-row-name">${name}</span>
                <span class="group-row-votes">${g.best_votes} best vote${g.best_votes !== 1 ? 's' : ''}</span>
              </div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${coinPct}%"></div>
              </div>
              <div class="bar-track">
                <div class="bar-fill best" style="width:${bestPct}%"></div>
              </div>
              <div class="stats-row">
                <span class="coins-label">⟡ ${g.coins.toLocaleString()} coins</span>
                <span class="best-label">★ ${g.best_votes} / ${totalBest} best votes</span>
              </div>
            </div>
          `;
        });

        html += `</div>`;
      });

      html += `<footer>Created by Fang and Claw 2026</footer>`;
      app.innerHTML = html;
      document.getElementById('refresh').addEventListener('click', loadResults);

    } catch (err) {
      app.innerHTML = `
        <h1>Startup Vote 2026</h1>
        <p class="subtitle">Results — Teacher view</p>
        <p class="error">Could not load results. Check your connection or Script URL.</p>
        <button class="refresh-btn" id="refresh">↻ Refresh</button>
      `;
      document.getElementById('refresh').addEventListener('click', loadResults);
    }
  }

  loadResults();
</script>
</body>
</html>
